name: Deploy to Pi

on:
  push:
    branches: [main]
    paths:
      - 'scripts/garage_logger.py'
      - 'scripts/alerter.py'
      - 'requirements.txt'
      - 'scripts/export_to_s3.py'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Tailscale diagnostics
        run: |
          echo "=== Tailscale status ==="
          tailscale status || true
          echo ""
          echo "=== Resolve 'garagepi' via Tailscale ==="
          tailscale ip garagepi || echo "FAILED: tailscale ip"
          echo ""
          echo "=== getent hosts garagepi (system resolver) ==="
          getent hosts garagepi || echo "FAILED: getent"
          echo ""
          echo "=== Ping garagepi ==="
          ping -c 3 -W 5 garagepi || echo "FAILED: ping"
          echo ""
          echo "=== TCP probe on port 22 ==="
          timeout 10 bash -c '</dev/tcp/garagepi/22 && echo OPEN' || echo "FAILED: port 22 unreachable"
          echo ""
          echo "=== Direct SSH handshake (verbose, no key) ==="
          ssh -vvv -o BatchMode=yes -o ConnectTimeout=5 -o StrictHostKeyChecking=no travismagaluk@garagepi exit 2>&1 | head -60 || true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_SSH_HOST }}
          username: travismagaluk
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            cd /home/travismagaluk/garagewatch
            git pull origin main
            pip install -r requirements.txt --quiet
            sudo systemctl restart garage_logger
